<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>D3 EMOTIONS QC</title><style>
:root{--bg:#0a0a0c;--card:#16161c;--border:#2a2a35;--gold:#d4af37;--text:#e0ddd5;--faint:#7a7a88;--green:#4ade80;--red:#f87171;--cyan:#00d9ff}
*{margin:0;padding:0;box-sizing:border-box}body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;padding:14px;padding-bottom:40px}
h1{font-family:Consolas,monospace;color:var(--gold);letter-spacing:3px;font-size:16px}
.sub{color:var(--faint);font-size:12px;margin:3px 0 10px;max-width:900px}
.nav{display:flex;gap:6px;margin:8px 0;flex-wrap:wrap}.st{font-family:Consolas,monospace;font-size:10.5px;letter-spacing:1px;padding:6px 10px;border:1px solid var(--border);border-radius:7px;color:var(--faint);text-decoration:none}.st.on{color:var(--gold);border-color:rgba(212,175,55,.5);background:rgba(212,175,55,.1)}
button{background:rgba(212,175,55,.12);color:var(--gold);border:1px solid rgba(212,175,55,.5);border-radius:8px;padding:8px 14px;font-size:12px;font-weight:600;cursor:pointer;min-height:40px}
.addin{background:#0d0d11;border:1px solid var(--border);border-radius:8px;color:var(--text);padding:9px;font-size:13px;font-family:inherit;width:260px}
#remBar{position:sticky;top:6px;z-index:8;display:none;margin:8px 0}
#remBar button{width:100%;min-height:46px;color:var(--red);border-color:rgba(248,113,113,.6);background:rgba(248,113,113,.15);font-weight:700}
#wrap{overflow-x:auto;border:1px solid var(--border);border-radius:10px;background:var(--card)}
.prow{display:flex;width:max-content;border-bottom:1px solid #1c1c24;align-items:stretch}
.pname{position:sticky;left:0;z-index:3;background:var(--card);width:128px;min-width:128px;padding:6px 8px;font-size:11px;font-weight:600;display:flex;flex-direction:column;justify-content:center;border-right:1px solid var(--border)}
.pname .cnt{color:var(--faint);font-weight:400;font-size:9.5px}
.rh{width:30px;min-width:30px;display:flex;align-items:center;justify-content:center}
.rh button{min-height:0;height:80%;padding:0 6px;font-size:12px;border-radius:7px}
.cell{width:66px;min-width:66px;padding:3px;text-align:center;cursor:pointer}
.cell img{width:60px;height:60px;object-fit:cover;border-radius:6px;background:#000;display:block}
.cell .em{font-size:7.5px;color:var(--faint);overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.cell.on{outline:2px solid var(--red);border-radius:8px;opacity:.65}
#toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--gold);border-radius:9px;padding:10px 18px;font-size:13px;display:none;z-index:30}
</style></head><body>
<h1>D3 · EMOTIONS QC</h1>
<div class="nav"><a href="index.html" class="st">① BATCH</a><a href="batch.html" class="st">② TOURNEY</a><a href="studio.html" class="st">③ TRAIN + ASSIGN</a><a href="loop.html" class="st">④ LOOP</a><span class="st on">⑤ EMOTIONS</span><a href="identity.html" class="st">⑥ IDENTITY</a></div>
<div class="sub">every philosopher's full emotion set — one row each. Tap the <b style="color:var(--red)">▸ handle</b> to mark a whole row, untap the keepers, then REMOVE (buried, recoverable). Fills in live while the FACTORY renders. <span class="st" id="meta" style="border:none"></span></div>
<div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap"><input id="find" class="addin" placeholder="find a philosopher…"><button onclick="MARK.clear();render()" style="color:var(--faint);border-color:var(--border);background:transparent">clear marks</button></div>
<div id="remBar"><button id="remBtn" onclick="removeMarked()">🗑 REMOVE <span id="remN">0</span> EMOTION SPRITES (bury — regen later)</button></div>
<div id="wrap"><div id="rows" style="padding-bottom:4px"></div></div>
<div id="toast"></div>
<script>
const SB='https://hwqovzizjoelzfulhxem.supabase.co';
const KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh3cW92eml6am9lbHpmdWxoeGVtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2MzU5MTQsImV4cCI6MjA5NDIxMTkxNH0.U-4EkTX5FuvRwncQnejAQUaPLCLRyE8yk1uCQfz8XdU';
const H={'apikey':KEY,'Authorization':'Bearer '+KEY,'Content-Type':'application/json'};
const STORE=SB+'/storage/v1/object/public/style-tourney/';
let CE=null,MARK=new Set(),sig='';
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.style.display='block';setTimeout(()=>t.style.display='none',3200)}
const pretty=s=>s.replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase());
function emoSort(a,b){if(a.emotion==='neutral')return -1;if(b.emotion==='neutral')return 1;return a.emotion<b.emotion?-1:1}
async function load(){
  try{CE=await(await fetch(STORE+'castemotions.json?'+Date.now())).json()}catch(e){return}
  const s=(CE.updated||'')+'|'+(CE.total||0);
  if(s!==sig){sig=s;render()}
  document.getElementById('meta').textContent=(CE.total||0)+' sprites · updated '+(CE.updated||'—');
}
function render(){
  const q=(document.getElementById('find').value||'').toLowerCase();
  const ents=Object.entries((CE&&CE.entities)||{}).filter(([s])=>!s.startsWith('_')&&s.includes(q.replace(/ /g,'_'))).sort();
  document.getElementById('remBar').style.display=MARK.size?'block':'none';
  document.getElementById('remN').textContent=MARK.size;
  document.getElementById('rows').innerHTML=ents.map(([slug,emos])=>{
    const list=[...emos].sort(emoSort);
    const allOn=list.every(e=>MARK.has(slug+'|'+e.emotion));
    return `<div class="prow"><div class="pname">${pretty(slug)}<span class="cnt">${list.length} emotions</span></div>
      <div class="rh"><button onclick="togRow('${slug}')" style="${allOn?'color:#0a0a0c;background:var(--red);border-color:var(--red)':'color:var(--red);border-color:rgba(248,113,113,.45);background:rgba(248,113,113,.07)'}">${allOn?'✓':'▸'}</button></div>`+
      list.map(e=>{const k=slug+'|'+e.emotion,on=MARK.has(k);
        return `<div class="cell${on?' on':''}" onclick="tog('${slug}','${e.emotion}')"><img loading="lazy" decoding="async" src="${e.thumb}"><div class="em">${e.emotion}</div></div>`}).join('')+'</div>';
  }).join('')||'<div style="padding:16px;color:var(--faint)">no emotions published yet — the FACTORY may still be warming up</div>';
}
function tog(s,e){const k=s+'|'+e;MARK.has(k)?MARK.delete(k):MARK.add(k);render()}
function togRow(slug){const emos=((CE&&CE.entities)||{})[slug]||[];const all=emos.every(e=>MARK.has(slug+'|'+e.emotion));
  emos.forEach(e=>{const k=slug+'|'+e.emotion;all?MARK.delete(k):MARK.add(k)});render()}
async function removeMarked(){
  const items=[...MARK].map(k=>{const [slug,emotion]=k.split('|');return {slug,emotion}});
  const b=document.getElementById('remBtn');b.disabled=true;
  try{const r=await fetch(SB+'/rest/v1/studio_cmds',{method:'POST',headers:H,body:JSON.stringify({action:'emotion_remove',payload:{items}})});
    toast(r.ok?('🗑 removing '+items.length+' — grid refreshes as the PC processes'):'failed — bridge up?');
    if(r.ok)MARK.clear();}catch(e){toast('offline?')}
  b.disabled=false;render();
}
document.getElementById('find').addEventListener('input',render);
load();setInterval(load,20000);
</script></body></html>
