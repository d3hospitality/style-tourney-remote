<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>D3 IDENTITY</title><style>
:root{--bg:#0a0a0c;--card:#16161c;--border:#2a2a35;--gold:#d4af37;--text:#e0ddd5;--faint:#7a7a88;--green:#4ade80;--cyan:#00d9ff}
*{margin:0;padding:0;box-sizing:border-box}body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;padding:14px;max-width:1000px;margin:0 auto;padding-bottom:40px}
h1{font-family:Consolas,monospace;color:var(--gold);letter-spacing:3px;font-size:16px}
.sub{color:var(--faint);font-size:12px;margin:3px 0 10px}
.nav{display:flex;gap:6px;margin:8px 0;flex-wrap:wrap}.st{font-family:Consolas,monospace;font-size:10.5px;letter-spacing:1px;padding:6px 10px;border:1px solid var(--border);border-radius:7px;color:var(--faint);text-decoration:none}.st.on{color:var(--gold);border-color:rgba(212,175,55,.5);background:rgba(212,175,55,.1)}
.status{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:11px;margin-bottom:12px;font-size:13px}
.status .run{color:var(--cyan)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px}
.row{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:10px}
.row .nm{font-size:12px;font-weight:700;margin-bottom:7px}.row .nm span{color:var(--faint);font-weight:400;font-size:10px}
.ba{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.ba figure{margin:0}.ba img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:8px;background:#000;display:block}
.ba figcaption{font-size:9.5px;text-align:center;margin-top:3px;font-family:Consolas,monospace;letter-spacing:1px}
.before figcaption{color:var(--faint)}.after figcaption{color:var(--green)}
.after img{outline:2px solid rgba(74,222,128,.5)}
</style></head><body>
<h1>D3 · ⑥ IDENTITY</h1>
<div class="nav"><a href="index.html" class="st">① BATCH</a><a href="batch.html" class="st">② TOURNEY</a><a href="studio.html" class="st">③ TRAIN + ASSIGN</a><a href="loop.html" class="st">④ LOOP</a><a href="emotions.html" class="st">⑤ EMOTIONS</a><span class="st on">⑥ IDENTITY</span></div>
<div class="sub">the 20-reference IP-Adapter identity fix. <b>BEFORE</b> = old single-reference sprite · <b>AFTER</b> = 20 refs → IP-Adapter, filtered through the mannequin. Stronger likeness, on-style.</div>
<div class="status" id="status">loading…</div>
<div class="grid" id="grid"></div>
<script>
const STORE='https://hwqovzizjoelzfulhxem.supabase.co/storage/v1/object/public/style-tourney/';
let sig='';
async function load(){
  let d; try{d=await(await fetch(STORE+'ipadapter.json?'+Date.now())).json()}catch(e){document.getElementById('status').textContent='no IP-Adapter run yet';return}
  const s=JSON.stringify([d.updated,d.count,d.running]); if(s===sig)return; sig=s;
  document.getElementById('status').innerHTML = (d.running
    ? `<span class="run">🎨 ${d.running}</span>` : `✓ ${d.count} entities rebuilt with 20-ref identity`)
    + ` <span style="color:var(--faint)">· updated ${d.updated||''}</span>`;
  document.getElementById('grid').innerHTML=(d.items||[]).slice().reverse().map(x=>
    `<div class="row"><div class="nm">${x.name} <span>· ${x.refs} refs</span></div>
      <div class="ba">
        <figure class="before"><img loading="lazy" src="${x.before}"><figcaption>BEFORE · 1 ref</figcaption></figure>
        <figure class="after"><img loading="lazy" src="${x.after}"><figcaption>AFTER · ${x.refs} refs</figcaption></figure>
      </div></div>`).join('') || '<div class="sub">rendering…</div>';
}
load();setInterval(load,8000);
</script></body></html>
